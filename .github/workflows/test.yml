name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'drought-backend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'drought-backend/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./drought-backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: drought-backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        # DATABASE_URL is overridden inside conftest.py to SQLite — no external DB needed.
        # Redis is optional; the cache service falls back to in-memory automatically.
        env:
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          CLOUD_STORAGE_BUCKET: test-bucket
          CLOUD_STORAGE_ACCESS_KEY: test-key
          CLOUD_STORAGE_SECRET_KEY: test-secret
          CLOUD_STORAGE_ENDPOINT: http://localhost
        run: pytest --tb=short -q
