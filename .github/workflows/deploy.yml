name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Build ───────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: drought-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./drought-frontend
        run: npm ci

      - name: Build (static export for GitHub Pages)
        working-directory: ./drought-frontend
        # GITHUB_ACTIONS=true is already set automatically — next.config.mjs reads it
        # to inject basePath=/DroughtMonitor so images and routes work on Pages.
        # NEXT_PUBLIC_API_URL must be set as a repository secret named RENDER_BACKEND_URL.
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./drought-frontend/out

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

